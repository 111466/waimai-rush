<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>RoadGen A Prototype</title>
  <style>
    :root {
      color-scheme: light;
      font-family: Inter, "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      background: #dce3df;
      color: #f7fbff;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      width: 100%;
      height: 100%;
      margin: 0;
      overflow: hidden;
    }

    body {
      background: linear-gradient(#d7dde0, #cad6cf);
    }

    #app {
      position: fixed;
      inset: 0;
    }

    canvas.webgl {
      display: block;
      width: 100%;
      height: 100%;
    }

    .hud {
      position: fixed;
      z-index: 10;
      pointer-events: none;
      text-shadow: 0 1px 8px rgba(35, 54, 57, 0.18);
    }

    .stats {
      top: 22px;
      left: 24px;
      display: grid;
      gap: 6px;
      min-width: 255px;
      color: rgba(255, 255, 255, 0.9);
    }

    .stats .title {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: 0;
    }

    .stats .line {
      font-size: 14px;
      color: rgba(255, 255, 255, 0.78);
    }

    .money {
      top: 26px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffd422;
      font-size: 34px;
      font-weight: 700;
    }

    .speed {
      top: 33px;
      right: 108px;
      font-size: 24px;
      color: rgba(245, 248, 247, 0.62);
    }

    .minimap-wrap {
      top: 98px;
      right: 22px;
      width: 206px;
      border-radius: 10px;
      background: rgba(20, 35, 38, 0.78);
      box-shadow: 0 16px 34px rgba(23, 40, 44, 0.22);
      backdrop-filter: blur(5px);
      overflow: hidden;
      pointer-events: none;
    }

    #minimap {
      display: block;
      width: 206px;
      height: 206px;
    }

    .minimap-label {
      padding: 0 12px 13px;
      color: rgba(255, 255, 255, 0.9);
      font-size: 20px;
      font-weight: 700;
      line-height: 1.2;
    }

    .controls {
      position: fixed;
      z-index: 12;
      left: 50%;
      bottom: 18px;
      transform: translateX(-50%);
      display: flex;
      align-items: end;
      gap: 12px;
      max-width: calc(100vw - 32px);
      padding: 12px;
      border-radius: 10px;
      background: rgba(22, 36, 38, 0.78);
      box-shadow: 0 14px 30px rgba(27, 45, 49, 0.22);
      backdrop-filter: blur(7px);
      color: rgba(255, 255, 255, 0.92);
    }

    .control {
      display: grid;
      gap: 6px;
      min-width: 116px;
    }

    .control.seed {
      min-width: 150px;
    }

    .control label {
      font-size: 12px;
      color: rgba(255, 255, 255, 0.72);
      white-space: nowrap;
    }

    .control output {
      color: rgba(255, 255, 255, 0.92);
      font-variant-numeric: tabular-nums;
    }

    input[type="text"],
    input[type="range"],
    button {
      font: inherit;
    }

    input[type="text"] {
      width: 100%;
      height: 34px;
      padding: 0 10px;
      border: 1px solid rgba(255, 255, 255, 0.18);
      border-radius: 7px;
      outline: none;
      color: #f8fbff;
      background: rgba(255, 255, 255, 0.12);
    }

    input[type="range"] {
      width: 122px;
      accent-color: #8ec7df;
    }

    button {
      height: 34px;
      padding: 0 14px;
      border: 0;
      border-radius: 7px;
      color: #213033;
      background: #d9eff4;
      cursor: pointer;
      font-weight: 700;
    }

    button.secondary {
      color: #eef8fa;
      background: rgba(255, 255, 255, 0.15);
    }

    .hint {
      position: fixed;
      right: 24px;
      bottom: 20px;
      z-index: 11;
      max-width: 260px;
      color: rgba(255, 255, 255, 0.56);
      font-size: 12px;
      line-height: 1.55;
      text-align: right;
      pointer-events: none;
    }

    .gameover {
      position: fixed;
      inset: 0;
      z-index: 30;
      display: grid;
      place-items: center;
      background: rgba(12, 20, 22, 0.34);
      pointer-events: auto;
    }

    .gameover.hidden {
      display: none;
    }

    .gameover-box {
      width: min(320px, calc(100vw - 36px));
      padding: 20px;
      border-radius: 10px;
      background: rgba(20, 34, 37, 0.88);
      box-shadow: 0 18px 46px rgba(18, 31, 35, 0.32);
      backdrop-filter: blur(7px);
      text-align: center;
    }

    .gameover-box h2 {
      margin: 0 0 8px;
      font-size: 24px;
      letter-spacing: 0;
    }

    .gameover-box p {
      margin: 0 0 16px;
      color: rgba(244, 249, 250, 0.72);
      font-size: 14px;
      line-height: 1.45;
    }

    @media (max-width: 760px) {
      .stats .title {
        font-size: 22px;
      }

      .money {
        display: none;
      }

      .speed {
        display: none;
      }

      .minimap-wrap {
        top: 82px;
        right: 12px;
        width: 154px;
      }

      #minimap {
        width: 154px;
        height: 154px;
      }

      .minimap-label {
        font-size: 16px;
      }

      .controls {
        left: 12px;
        right: 12px;
        bottom: 12px;
        transform: none;
        flex-wrap: wrap;
        align-items: center;
      }

      .control,
      .control.seed {
        min-width: 130px;
        flex: 1 1 130px;
      }

      input[type="range"] {
        width: 100%;
      }

      .hint {
        display: none;
      }
    }
  </style>
</head>
<body>
  <div id="app"></div>

  <section class="hud stats" aria-live="polite">
    <div class="title">等待订单</div>
    <div class="line" id="statsLineA">Grid 8 x 8 · Seed metro-1842</div>
    <div class="line" id="statsLineB">Reachable 100% · Roads 112</div>
  </section>

  <section class="hud minimap-wrap">
    <canvas id="minimap" width="206" height="206" aria-label="Road network minimap"></canvas>
    <div class="minimap-label" id="minimapLabel">Seed metro-1842</div>
  </section>

  <form class="controls" id="controls">
    <div class="control seed">
      <label for="seedInput">Seed</label>
      <input id="seedInput" type="text" value="metro-1842" spellcheck="false" autocomplete="off">
    </div>
    <div class="control">
      <label for="gridInput">Grid <output id="gridOutput">8 x 8</output></label>
      <input id="gridInput" type="range" min="5" max="11" step="1" value="8">
    </div>
    <div class="control">
      <label for="closureInput">Closure <output id="closureOutput">18%</output></label>
      <input id="closureInput" type="range" min="0" max="42" step="1" value="18">
    </div>
    <div class="control">
      <label for="jitterInput">Jitter <output id="jitterOutput">22m</output></label>
      <input id="jitterInput" type="range" min="0" max="38" step="1" value="22">
    </div>
    <button type="submit">Regenerate</button>
    <button type="button" class="secondary" id="randomSeedButton">Random Seed</button>
  </form>

  <div class="hint">鼠标左键拖动旋转 · 右键拖动平移 · 滚轮缩放</div>

  <script type="importmap">
    {
      "imports": {
        "three": "https://unpkg.com/three@0.165.0/build/three.module.js",
        "three/addons/": "https://unpkg.com/three@0.165.0/examples/jsm/"
      }
    }
  </script>
  <script type="module">
    import * as THREE from "three";
    import { MapControls } from "three/addons/controls/MapControls.js";

    const app = document.querySelector("#app");
    const seedInput = document.querySelector("#seedInput");
    const gridInput = document.querySelector("#gridInput");
    const closureInput = document.querySelector("#closureInput");
    const jitterInput = document.querySelector("#jitterInput");
    const gridOutput = document.querySelector("#gridOutput");
    const closureOutput = document.querySelector("#closureOutput");
    const jitterOutput = document.querySelector("#jitterOutput");
    const statsLineA = document.querySelector("#statsLineA");
    const statsLineB = document.querySelector("#statsLineB");
    const minimap = document.querySelector("#minimap");
    const minimapLabel = document.querySelector("#minimapLabel");
    const controlsForm = document.querySelector("#controls");
    const randomSeedButton = document.querySelector("#randomSeedButton");
    const ROAD_WIDTH = 7.2;
    const SIDEWALK_WIDTH = 4.7;
    const CURB_WIDTH = 0.34;
    const LANE_MARK_WIDTH = 0.18;
    const LANE_MARK_LEN = 2.6;
    const INTERSECTION_SIZE = 9.2;
    const BASE_BLOCK = 86;
    const MIN_REACHABLE = 0.8;
    const MAX_ATTEMPTS = 30;

    const colorSets = {
      road: 0xc7cecc,
      roadDark: 0x7e918d,
      sidewalk: 0xd6dcda,
      lane: 0x9ec0cf,
      grass: 0x92b692,
      curb: 0x80938f,
      start: 0x8d6cff,
      building: [0xaaa4b7, 0xaebba6, 0xb7ad99, 0x93aaa4, 0xb5a2aa, 0xb9c4c5, 0x9e9caa],
    };

    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0xd9e0df);
    scene.fog = new THREE.FogExp2(0xd9e0df, 0.0038);

    const camera = new THREE.PerspectiveCamera(52, window.innerWidth / window.innerHeight, 0.1, 2400);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    renderer.domElement.className = "webgl";
    app.appendChild(renderer.domElement);

    const controls = new MapControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.08;
    controls.maxPolarAngle = Math.PI * 0.47;
    controls.minDistance = 32;
    controls.maxDistance = 760;
    controls.enableRotate = true;
    controls.enablePan = true;
    controls.enableZoom = true;
    controls.screenSpacePanning = false;
    controls.enabled = true;

    const hemi = new THREE.HemisphereLight(0xffffff, 0xb9c3b7, 2.6);
    scene.add(hemi);

    const sun = new THREE.DirectionalLight(0xffffff, 2.4);
    sun.position.set(-90, 160, -70);
    sun.castShadow = true;
    sun.shadow.mapSize.set(2048, 2048);
    sun.shadow.camera.near = 20;
    sun.shadow.camera.far = 420;
    sun.shadow.camera.left = -260;
    sun.shadow.camera.right = 260;
    sun.shadow.camera.top = 260;
    sun.shadow.camera.bottom = -260;
    scene.add(sun);
    const sunTarget = new THREE.Object3D();
    scene.add(sunTarget);
    sun.target = sunTarget;

    const materials = {
      road: matte(colorSets.road, 0.92),
      sidewalk: matte(colorSets.sidewalk, 0.92),
      curb: matte(colorSets.curb, 0.86),
      lane: matte(colorSets.lane, 0.92),
      grass: matte(colorSets.grass, 0.94),
      start: matte(colorSets.start, 0.78),
    };

    let currentRoot = new THREE.Group();
    scene.add(currentRoot);
    let currentGraph = null;

    function matte(color, roughness) {
      return new THREE.MeshStandardMaterial({
        color,
        roughness,
        metalness: 0,
      });
    }

    function hashString(value) {
      let h = 2166136261;
      for (let i = 0; i < value.length; i += 1) {
        h ^= value.charCodeAt(i);
        h = Math.imul(h, 16777619);
      }
      return h >>> 0;
    }

    function mulberry32(seed) {
      let t = seed >>> 0;
      return function rng() {
        t += 0x6d2b79f5;
        let r = Math.imul(t ^ (t >>> 15), 1 | t);
        r ^= r + Math.imul(r ^ (r >>> 7), 61 | r);
        return ((r ^ (r >>> 14)) >>> 0) / 4294967296;
      };
    }

    function randomFrom(rng, min, max) {
      return min + rng() * (max - min);
    }

    function keyForEdge(a, b) {
      return a < b ? `${a}:${b}` : `${b}:${a}`;
    }

    function nodeId(x, z, cols) {
      return z * cols + x;
    }

    function makeConfig() {
      return {
        seed: seedInput.value.trim() || "metro-1842",
        grid: Number(gridInput.value),
        closureRate: Number(closureInput.value) / 100,
        jitter: Number(jitterInput.value),
      };
    }

    function buildRoadGraph(config) {
      const baseSeed = hashString(config.seed);
      let fallback = null;
      for (let attempt = 0; attempt < MAX_ATTEMPTS; attempt += 1) {
        const rng = mulberry32(baseSeed + attempt * 1013904223);
        const candidate = generateCandidate(config, rng, attempt);
        if (!fallback || candidate.reachableRatio > fallback.reachableRatio) {
          fallback = candidate;
        }
        if (candidate.valid) {
          return candidate;
        }
      }

      const safeConfig = { ...config, closureRate: Math.min(config.closureRate, 0.1) };
      const rng = mulberry32(baseSeed + 0x9e3779b9);
      const safe = generateCandidate(safeConfig, rng, MAX_ATTEMPTS);
      if (safe.valid) {
        return { ...safe, fallback: true };
      }
      return { ...fallback, fallback: true };
    }

    function generateCandidate(config, rng, attempt) {
      const rows = config.grid;
      const cols = config.grid;
      const jitter = config.jitter;
      const xSteps = Array.from({ length: cols - 1 }, () => Math.max(55, BASE_BLOCK + randomFrom(rng, -jitter, jitter)));
      const zSteps = Array.from({ length: rows - 1 }, () => Math.max(55, BASE_BLOCK + randomFrom(rng, -jitter, jitter)));
      const xs = [0];
      const zs = [0];
      for (let i = 0; i < xSteps.length; i += 1) xs.push(xs[i] + xSteps[i]);
      for (let i = 0; i < zSteps.length; i += 1) zs.push(zs[i] + zSteps[i]);
      const centerX = (xs[0] + xs[xs.length - 1]) * 0.5;
      const centerZ = (zs[0] + zs[zs.length - 1]) * 0.5;

      const nodes = [];
      for (let z = 0; z < rows; z += 1) {
        for (let x = 0; x < cols; x += 1) {
          nodes.push({
            id: nodeId(x, z, cols),
            x,
            z,
            wx: xs[x] - centerX,
            wz: zs[z] - centerZ,
          });
        }
      }

      const candidateEdges = [];
      for (let z = 0; z < rows; z += 1) {
        for (let x = 0; x < cols; x += 1) {
          const id = nodeId(x, z, cols);
          if (x < cols - 1) candidateEdges.push({ a: id, b: nodeId(x + 1, z, cols), horizontal: true });
          if (z < rows - 1) candidateEdges.push({ a: id, b: nodeId(x, z + 1, cols), horizontal: false });
        }
      }

      const startX = Math.floor(cols / 2);
      const startId = nodeId(startX, 0, cols);
      const keep = new Set();

      let cursorX = startX;
      for (let z = 0; z < rows - 1; z += 1) {
        const shouldDrift = rng() < 0.66;
        if (shouldDrift) {
          const dir = rng() < 0.5 ? -1 : 1;
          const nextX = Math.max(0, Math.min(cols - 1, cursorX + dir));
          if (nextX !== cursorX) {
            keep.add(keyForEdge(nodeId(cursorX, z, cols), nodeId(nextX, z, cols)));
            cursorX = nextX;
          }
        }
        keep.add(keyForEdge(nodeId(cursorX, z, cols), nodeId(cursorX, z + 1, cols)));
      }

      for (let z = 0; z < rows; z += 1) {
        if (rng() < 0.55) {
          const from = Math.floor(randomFrom(rng, 0, cols - 1));
          const to = Math.floor(randomFrom(rng, from + 1, cols));
          for (let x = from; x < to; x += 1) {
            keep.add(keyForEdge(nodeId(x, z, cols), nodeId(x + 1, z, cols)));
          }
        }
      }

      for (let x = 0; x < cols; x += 1) {
        if (rng() < 0.42) {
          const from = Math.floor(randomFrom(rng, 0, rows - 1));
          const to = Math.floor(randomFrom(rng, from + 1, rows));
          for (let z = from; z < to; z += 1) {
            keep.add(keyForEdge(nodeId(x, z, cols), nodeId(x, z + 1, cols)));
          }
        }
      }

      const edges = [];
      for (const edge of candidateEdges) {
        const k = keyForEdge(edge.a, edge.b);
        if (keep.has(k) || rng() > config.closureRate) {
          edges.push({ ...edge, key: k });
        }
      }

      const adjacency = makeAdjacency(nodes.length, edges);
      const reachable = findReachable(startId, adjacency);
      const reachableRatio = reachable.size / nodes.length;
      const valid = adjacency[startId].length > 0 && reachableRatio >= MIN_REACHABLE;

      return {
        rows,
        cols,
        nodes,
        edges,
        startId,
        reachable,
        reachableRatio,
        valid,
        attempt,
        width: xs[xs.length - 1],
        depth: zs[zs.length - 1],
        config,
      };
    }

    function makeAdjacency(count, edges) {
      const adjacency = Array.from({ length: count }, () => []);
      for (const edge of edges) {
        adjacency[edge.a].push(edge.b);
        adjacency[edge.b].push(edge.a);
      }
      return adjacency;
    }

    function findReachable(start, adjacency) {
      const seen = new Set([start]);
      const queue = [start];
      for (let head = 0; head < queue.length; head += 1) {
        const id = queue[head];
        for (const next of adjacency[id]) {
          if (!seen.has(next)) {
            seen.add(next);
            queue.push(next);
          }
        }
      }
      return seen;
    }

    function regenerate(randomizeSeed = false) {
      if (randomizeSeed) {
        seedInput.value = `metro-${Math.floor(1000 + Math.random() * 9000)}`;
      }

      updateControlLabels();
      const config = makeConfig();
      currentGraph = buildRoadGraph(config);
      renderGraph(currentGraph);
      drawMinimap(currentGraph);
      updateStats(currentGraph);
      syncUrl(config);
    }

    function updateControlLabels() {
      const grid = Number(gridInput.value);
      gridOutput.value = `${grid} x ${grid}`;
      closureOutput.value = `${closureInput.value}%`;
      jitterOutput.value = `${jitterInput.value}m`;
    }

    function syncUrl(config) {
      const params = new URLSearchParams({
        seed: config.seed,
        grid: String(config.grid),
        closure: String(Math.round(config.closureRate * 100)),
        jitter: String(config.jitter),
      });
      history.replaceState(null, "", `${location.pathname}?${params.toString()}`);
    }

    function loadUrlParams() {
      const params = new URLSearchParams(location.search);
      if (params.has("seed")) seedInput.value = params.get("seed");
      if (params.has("grid")) gridInput.value = clamp(Number(params.get("grid")), 5, 11);
      if (params.has("closure")) closureInput.value = clamp(Number(params.get("closure")), 0, 42);
      if (params.has("jitter")) jitterInput.value = clamp(Number(params.get("jitter")), 0, 38);
    }

    function clamp(value, min, max) {
      if (!Number.isFinite(value)) return min;
      return Math.max(min, Math.min(max, value));
    }

    function clearCurrentRoot() {
      scene.remove(currentRoot);
      currentRoot.traverse((object) => {
        if (object.geometry) object.geometry.dispose();
      });
      currentRoot = new THREE.Group();
      scene.add(currentRoot);
    }

    function renderGraph(graph) {
      clearCurrentRoot();

      const worldW = graph.width + 190;
      const worldD = graph.depth + 210;
      const ground = new THREE.Mesh(new THREE.PlaneGeometry(worldW, worldD), materials.grass);
      ground.rotation.x = -Math.PI / 2;
      ground.position.y = -0.03;
      ground.receiveShadow = true;
      currentRoot.add(ground);

      for (const edge of graph.edges) {
        addRoad(edge, graph.nodes);
      }

      for (const node of graph.nodes) {
        if (graph.reachable.has(node.id)) {
          addIntersection(node, node.id === graph.startId);
        } else {
          addUnreachableMarker(node);
        }
      }

      addBuildings(graph);
      resetCamera(graph);
    }

    function addRoad(edge, nodes) {
      const a = nodes[edge.a];
      const b = nodes[edge.b];
      const dx = b.wx - a.wx;
      const dz = b.wz - a.wz;
      const len = Math.hypot(dx, dz);
      const midX = (a.wx + b.wx) * 0.5;
      const midZ = (a.wz + b.wz) * 0.5;
      const yaw = Math.atan2(dx, dz);

      addBox({
        name: "Road",
        position: [midX, 0.035, midZ],
        scale: [ROAD_WIDTH, 0.07, len],
        yaw,
        material: materials.road,
        receiveShadow: true,
      });

      const sidewalkOffset = ROAD_WIDTH * 0.5 + SIDEWALK_WIDTH * 0.5 + CURB_WIDTH;
      addBox({
        name: "SidewalkL",
        position: lateralPosition(midX, midZ, yaw, sidewalkOffset, 0.06),
        scale: [SIDEWALK_WIDTH, 0.12, len],
        yaw,
        material: materials.sidewalk,
        receiveShadow: true,
      });
      addBox({
        name: "SidewalkR",
        position: lateralPosition(midX, midZ, yaw, -sidewalkOffset, 0.06),
        scale: [SIDEWALK_WIDTH, 0.12, len],
        yaw,
        material: materials.sidewalk,
        receiveShadow: true,
      });

      const curbOffset = ROAD_WIDTH * 0.5 + CURB_WIDTH * 0.5;
      addBox({
        name: "CurbL",
        position: lateralPosition(midX, midZ, yaw, curbOffset, 0.16),
        scale: [CURB_WIDTH, 0.32, len],
        yaw,
        material: materials.curb,
        receiveShadow: true,
      });
      addBox({
        name: "CurbR",
        position: lateralPosition(midX, midZ, yaw, -curbOffset, 0.16),
        scale: [CURB_WIDTH, 0.32, len],
        yaw,
        material: materials.curb,
        receiveShadow: true,
      });

      const marks = Math.max(2, Math.floor(len / 11));
      for (let i = 1; i < marks; i += 1) {
        const t = i / marks;
        const x = a.wx + dx * t;
        const z = a.wz + dz * t;
        addLaneMark(x, z, yaw, -1.1);
        addLaneMark(x, z, yaw, 1.1);
      }
    }

    function addLaneMark(x, z, yaw, offset) {
      addBox({
        name: "LaneMark",
        position: lateralPosition(x, z, yaw, offset, 0.115),
        scale: [LANE_MARK_WIDTH, 0.035, LANE_MARK_LEN],
        yaw,
        material: materials.lane,
        receiveShadow: true,
      });
    }

    function addIntersection(node, isStart) {
      addBox({
        name: isStart ? "StartIntersection" : "Intersection",
        position: [node.wx, 0.045, node.wz],
        scale: [INTERSECTION_SIZE, 0.09, INTERSECTION_SIZE],
        yaw: 0,
        material: isStart ? materials.start : materials.road,
        receiveShadow: true,
      });
    }

    function addUnreachableMarker(node) {
      const geometry = new THREE.CylinderGeometry(1.2, 1.2, 0.12, 12);
      const material = matte(0x9a6262, 0.9);
      const marker = new THREE.Mesh(geometry, material);
      marker.position.set(node.wx, 0.18, node.wz);
      currentRoot.add(marker);
    }

    function addBuildings(graph) {
      const rng = mulberry32(hashString(`${graph.config.seed}:buildings:${graph.attempt}`));
      const occupied = new Set();
      for (const edge of graph.edges) {
        if (rng() < 0.1) continue;
        const a = graph.nodes[edge.a];
        const b = graph.nodes[edge.b];
        const dx = b.wx - a.wx;
        const dz = b.wz - a.wz;
        const len = Math.hypot(dx, dz);
        const yaw = Math.atan2(dx, dz);
        const slots = Math.max(2, Math.floor(len / 32));
        for (let i = 0; i < slots; i += 1) {
          const t = (i + 0.5) / slots;
          const baseX = a.wx + dx * t;
          const baseZ = a.wz + dz * t;
          for (const side of [-1, 1]) {
            if (rng() < 0.38) continue;
            const key = `${Math.round(baseX / 12)}:${Math.round(baseZ / 12)}:${side}`;
            if (occupied.has(key)) continue;
            occupied.add(key);
            const w = randomFrom(rng, 6.5, 12.5);
            const d = randomFrom(rng, 6.5, 14.5);
            const h = randomFrom(rng, 12, 58);
            const setback = randomFrom(rng, 18, 31);
            const [x, y, z] = lateralPosition(baseX, baseZ, yaw, side * setback, h * 0.5);
            const mat = matte(colorSets.building[Math.floor(rng() * colorSets.building.length)], 0.88);
            addBox({
              name: "Building",
              position: [x, y, z],
              scale: [w, h, d],
              yaw: yaw + randomFrom(rng, -0.08, 0.08),
              material: mat,
              castShadow: true,
              receiveShadow: true,
            });
          }
        }
      }
    }

    function addBox(options) {
      const geometry = new THREE.BoxGeometry(1, 1, 1);
      const mesh = new THREE.Mesh(geometry, options.material);
      mesh.name = options.name;
      mesh.position.set(options.position[0], options.position[1], options.position[2]);
      mesh.scale.set(options.scale[0], options.scale[1], options.scale[2]);
      mesh.rotation.y = options.yaw || 0;
      mesh.castShadow = Boolean(options.castShadow);
      mesh.receiveShadow = Boolean(options.receiveShadow);
      currentRoot.add(mesh);
      return mesh;
    }

    function lateralPosition(x, z, yaw, offset, y) {
      const rightX = Math.cos(yaw);
      const rightZ = -Math.sin(yaw);
      return [x + rightX * offset, y, z + rightZ * offset];
    }

    function resetCamera(graph) {
      const start = graph.nodes[graph.startId];
      const target = new THREE.Vector3(start.wx, 0, start.wz + graph.depth * 0.2);
      controls.target.copy(target);
      camera.position.set(start.wx - graph.width * 0.2, 72, start.wz - 118);
      camera.lookAt(target);
      controls.update();
    }

    function drawMinimap(graph) {
      const ctx = minimap.getContext("2d");
      const size = minimap.width;
      ctx.clearRect(0, 0, size, size);
      ctx.fillStyle = "rgba(20, 35, 38, 0.82)";
      ctx.fillRect(0, 0, size, size);

      const pad = 30;
      const xs = graph.nodes.map((n) => n.wx);
      const zs = graph.nodes.map((n) => n.wz);
      const minX = Math.min(...xs);
      const maxX = Math.max(...xs);
      const minZ = Math.min(...zs);
      const maxZ = Math.max(...zs);
      const scale = Math.min((size - pad * 2) / Math.max(1, maxX - minX), (size - pad * 2) / Math.max(1, maxZ - minZ));

      const project = (node) => ({
        x: size * 0.5 + (node.wx - (minX + maxX) * 0.5) * scale,
        y: size * 0.5 - (node.wz - (minZ + maxZ) * 0.5) * scale,
      });

      ctx.lineCap = "round";
      ctx.lineWidth = 3;
      for (const edge of graph.edges) {
        const a = project(graph.nodes[edge.a]);
        const b = project(graph.nodes[edge.b]);
        ctx.strokeStyle = graph.reachable.has(edge.a) && graph.reachable.has(edge.b)
          ? "rgba(208, 224, 226, 0.74)"
          : "rgba(150, 112, 112, 0.42)";
        ctx.beginPath();
        ctx.moveTo(a.x, a.y);
        ctx.lineTo(b.x, b.y);
        ctx.stroke();
      }

      for (const node of graph.nodes) {
        const p = project(node);
        ctx.fillStyle = graph.reachable.has(node.id) ? "rgba(222, 232, 233, 0.8)" : "rgba(170, 104, 104, 0.7)";
        ctx.beginPath();
        ctx.arc(p.x, p.y, 2.8, 0, Math.PI * 2);
        ctx.fill();
      }

      const start = project(graph.nodes[graph.startId]);
      ctx.fillStyle = "#8d6cff";
      ctx.beginPath();
      ctx.arc(start.x, start.y, 6.2, 0, Math.PI * 2);
      ctx.fill();
    }

    function updateStats(graph) {
      const pct = Math.round(graph.reachableRatio * 100);
      statsLineA.textContent = `Grid ${graph.cols} x ${graph.rows} · Seed ${graph.config.seed}`;
      statsLineB.textContent = `Reachable ${pct}% · Roads ${graph.edges.length}${graph.fallback ? " · fallback" : ""}`;
      minimapLabel.textContent = `Seed ${graph.config.seed}`;
    }

    controlsForm.addEventListener("submit", (event) => {
      event.preventDefault();
      regenerate(false);
    });

    randomSeedButton.addEventListener("click", () => regenerate(true));
    for (const input of [gridInput, closureInput, jitterInput]) {
      input.addEventListener("input", updateControlLabels);
      input.addEventListener("change", () => regenerate(false));
    }

    seedInput.addEventListener("keydown", (event) => {
      if (event.key === "Enter") {
        event.preventDefault();
        regenerate(false);
      }
    });

    window.addEventListener("resize", () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
      if (currentGraph) drawMinimap(currentGraph);
    });

    function animate() {
      controls.update();
      renderer.render(scene, camera);
      requestAnimationFrame(animate);
    }

    loadUrlParams();
    regenerate(false);
    animate();
  </script>
</body>
</html>
