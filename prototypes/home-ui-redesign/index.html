<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>外卖冲冲冲-首页原型</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --ink: #17222c;
      --soft: #5d6d78;
      --cream: #fff2c1;
      --paper: #fffaf0;
      --orange: #ff8316;
      --orange-dark: #d94e0a;
      --yellow: #ffd95a;
      --teal: #11c5b4;
      --blue: #2f8cff;
      --green: #2dcc72;
      --rose: #f15b70;
      --plum: #7447d8;
      --road: #2d3f4d;
      --road-dark: #1a2833;
      --white-line: rgba(255, 255, 255, 0.84);
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      font-family: "Microsoft YaHei", "PingFang SC", Arial, sans-serif;
      color: var(--ink);
      background:
        linear-gradient(145deg, rgba(17, 197, 180, 0.2), rgba(255, 131, 22, 0.18)),
        linear-gradient(180deg, #eefcff 0%, #fff2cf 100%);
    }

    body {
      min-height: 100vh;
      display: grid;
      place-items: center;
      padding: 28px;
    }

    button {
      border: 0;
      padding: 0;
      color: inherit;
      font: inherit;
      cursor: pointer;
      -webkit-tap-highlight-color: transparent;
    }

    .phone {
      position: relative;
      width: min(390px, 100vw - 32px);
      aspect-ratio: 390 / 844;
      overflow: hidden;
      border: 10px solid #101820;
      border-radius: 32px;
      background: #8ee5f5;
      box-shadow: 0 28px 78px rgba(20, 37, 48, 0.34);
      isolation: isolate;
    }

    .screen {
      position: absolute;
      inset: 0;
      overflow: hidden;
      border-radius: 22px;
      background:
        linear-gradient(180deg, #86e2f4 0%, #c7f6f4 34%, #ffe7a7 70%, #ffbb74 100%);
    }

    .skyline {
      position: absolute;
      inset: 0 0 auto;
      height: 260px;
      overflow: hidden;
    }

    .sun {
      position: absolute;
      top: 70px;
      right: 52px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #fff7a3 0 18%, transparent 20%),
        var(--yellow);
      box-shadow: 0 0 44px rgba(255, 217, 90, 0.58);
    }

    .cloud {
      position: absolute;
      width: 92px;
      height: 30px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      box-shadow:
        23px -10px 0 4px rgba(255, 255, 255, 0.76),
        54px -1px 0 rgba(255, 255, 255, 0.76);
      animation: cloudDrift 8s ease-in-out infinite alternate;
    }

    .cloud.one {
      left: 24px;
      top: 86px;
    }

    .cloud.two {
      right: 96px;
      top: 146px;
      width: 76px;
      opacity: 0.68;
      animation-delay: -3s;
    }

    .buildings {
      position: absolute;
      left: -18px;
      right: -18px;
      bottom: -2px;
      height: 142px;
      background:
        linear-gradient(90deg, rgba(255,255,255,0.22) 0 8px, transparent 8px 36px) 18px 50px / 72px 34px,
        linear-gradient(180deg, rgba(110, 207, 223, 0.95), rgba(47, 145, 175, 0.95));
      clip-path: polygon(0 56%, 7% 56%, 7% 24%, 18% 24%, 18% 39%, 30% 39%, 30% 12%, 45% 12%, 45% 32%, 56% 32%, 56% 48%, 68% 48%, 68% 20%, 82% 20%, 82% 38%, 93% 38%, 93% 28%, 100% 28%, 100% 100%, 0 100%);
    }

    .top-bar {
      position: absolute;
      z-index: 30;
      top: 14px;
      left: 14px;
      right: 14px;
      display: flex;
      align-items: flex-start;
      justify-content: space-between;
      gap: 10px;
    }

    .profile,
    .wallet,
    .route-panel,
    .mode-button,
    .mini-action,
    .dock-button {
      border: 3px solid rgba(255, 255, 255, 0.82);
      box-shadow: 0 7px 0 rgba(79, 43, 7, 0.16), 0 16px 28px rgba(17, 38, 50, 0.18);
    }

    .profile {
      width: 158px;
      min-height: 62px;
      padding: 9px 11px 10px;
      border-radius: 18px;
      color: #fff;
      background: linear-gradient(180deg, #263c4a, #142330);
    }

    .profile strong,
    .profile span {
      display: block;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .profile strong {
      font-size: 15px;
      line-height: 1.12;
    }

    .profile span {
      margin-top: 4px;
      color: #bcefff;
      font-size: 11px;
      font-weight: 800;
    }

    .xp-track {
      width: 100%;
      height: 7px;
      margin-top: 7px;
      overflow: hidden;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.18);
    }

    .xp-track i {
      display: block;
      width: 42%;
      height: 100%;
      border-radius: inherit;
      background: linear-gradient(90deg, var(--yellow), var(--green));
    }

    .wallet {
      min-width: 106px;
      height: 50px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      border-radius: 999px;
      color: #fff;
      background: linear-gradient(180deg, #ffb23f, var(--orange));
      font-size: 22px;
      font-weight: 900;
    }

    .coin {
      width: 23px;
      height: 23px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 34% 28%, #fff8a8 0 18%, transparent 20%),
        linear-gradient(145deg, #ffe86b, #ff9a1a);
      box-shadow: inset 0 -2px 0 rgba(106, 55, 0, 0.25);
      animation: coinPop 1.7s ease-in-out infinite;
    }

    .brand {
      position: absolute;
      z-index: 20;
      top: 88px;
      left: 22px;
      right: 22px;
      pointer-events: none;
    }

    .brand h1 {
      margin: 0;
      color: #fff;
      font-size: 48px;
      line-height: 0.96;
      font-weight: 900;
      letter-spacing: 0;
      text-shadow:
        0 5px 0 var(--orange-dark),
        0 11px 22px rgba(94, 38, 0, 0.25);
    }

    .brand h1 span {
      color: var(--yellow);
    }

    .brand p {
      display: inline-flex;
      align-items: center;
      min-height: 30px;
      margin: 12px 0 0;
      padding: 0 13px;
      border: 2px solid rgba(255, 255, 255, 0.86);
      border-radius: 999px;
      color: #633005;
      background: rgba(255, 250, 234, 0.92);
      box-shadow: 0 5px 0 rgba(115, 58, 0, 0.12);
      font-size: 13px;
      font-weight: 900;
    }

    .mode-row {
      position: absolute;
      z-index: 28;
      top: 218px;
      left: 22px;
      right: 22px;
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .mode-button {
      height: 38px;
      border-radius: 999px;
      color: #5b3905;
      background: rgba(255, 250, 232, 0.92);
      font-size: 13px;
      font-weight: 900;
      transition: transform 150ms ease, filter 150ms ease, background 150ms ease, color 150ms ease;
    }

    .mode-button.active {
      color: #fff;
      background: linear-gradient(180deg, #ffaf37, var(--orange));
    }

    .route-panel {
      position: absolute;
      z-index: 12;
      left: 24px;
      right: 24px;
      top: 270px;
      height: 298px;
      overflow: hidden;
      border-radius: 28px;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.16), transparent 32%),
        linear-gradient(145deg, #a8f1dc 0%, #6bd4c6 42%, #58b7cf 100%);
      transform: rotate(-1deg);
    }

    .route-panel::before {
      content: "";
      position: absolute;
      inset: 52px -24px auto;
      height: 156px;
      background:
        linear-gradient(90deg, transparent 0 34%, rgba(255,255,255,0.2) 34% 35%, transparent 35% 65%, rgba(255,255,255,0.2) 65% 66%, transparent 66%),
        linear-gradient(180deg, #61717c, var(--road-dark));
      clip-path: polygon(43% 0, 57% 0, 94% 100%, 6% 100%);
    }

    .route-panel::after {
      content: "";
      position: absolute;
      left: 50%;
      top: 60px;
      width: 6px;
      height: 150px;
      transform: translateX(-50%);
      background: repeating-linear-gradient(180deg, var(--white-line) 0 24px, transparent 24px 48px);
      animation: laneRun 850ms linear infinite;
    }

    .route-path {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
    }

    .map-pin {
      position: absolute;
      z-index: 4;
      width: 30px;
      height: 30px;
      display: grid;
      place-items: center;
      border: 3px solid #fff;
      border-radius: 50% 50% 50% 8px;
      color: #fff;
      background: var(--rose);
      box-shadow: 0 8px 14px rgba(12, 45, 60, 0.18);
      transform: rotate(-45deg);
      font-size: 13px;
      font-weight: 900;
    }

    .map-pin span {
      transform: rotate(45deg);
    }

    .pin-a {
      left: 34px;
      top: 78px;
      background: var(--orange);
    }

    .pin-b {
      right: 42px;
      top: 130px;
      background: var(--teal);
    }

    .pin-c {
      left: 108px;
      bottom: 48px;
      background: var(--plum);
    }

    .order-card {
      position: absolute;
      z-index: 18;
      left: 16px;
      bottom: 26px;
      width: 128px;
      min-height: 74px;
      padding: 9px 10px;
      border: 3px solid #8a3e06;
      border-radius: 16px;
      color: #663001;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.22), transparent 34%),
        linear-gradient(180deg, #ffe675, #ffb43a);
      box-shadow: 0 7px 0 rgba(101, 47, 4, 0.22), 0 12px 18px rgba(42, 27, 2, 0.16);
    }

    .order-card strong,
    .order-card span {
      display: block;
    }

    .order-card strong {
      color: #a33600;
      font-size: 22px;
      line-height: 1;
    }

    .order-card span {
      margin-top: 6px;
      font-size: 12px;
      line-height: 1.25;
      font-weight: 900;
    }

    .courier {
      position: absolute;
      z-index: 10;
      left: 50%;
      top: 106px;
      width: 154px;
      height: 154px;
      transform: translateX(-50%) rotate(1deg);
      filter: drop-shadow(0 19px 18px rgba(8, 26, 34, 0.3));
      animation: courierFloat 1.22s ease-in-out infinite;
    }

    .route-glow {
      position: absolute;
      z-index: 3;
      left: 78px;
      right: 76px;
      bottom: 58px;
      height: 18px;
      border-radius: 50%;
      background: rgba(18, 37, 48, 0.2);
      filter: blur(3px);
      animation: shadowBeat 1.22s ease-in-out infinite;
    }

    .action-rail {
      position: absolute;
      z-index: 34;
      right: 15px;
      top: 292px;
      display: grid;
      gap: 12px;
    }

    .mini-action {
      width: 58px;
      height: 58px;
      display: grid;
      place-items: center;
      border-radius: 18px;
      color: #fff;
      background: linear-gradient(180deg, #49c8ff, #2388e8);
      transition: transform 150ms ease, filter 150ms ease;
    }

    .mini-action:nth-child(2) {
      background: linear-gradient(180deg, #3be188, #1baa63);
    }

    .mini-action:nth-child(3) {
      background: linear-gradient(180deg, #ff7a82, #dd3d48);
    }

    .mini-action svg,
    .dock-icon svg {
      width: 25px;
      height: 25px;
      fill: none;
      stroke: currentColor;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .mini-action svg {
      stroke-width: 2.6;
    }

    .bottom-sheet {
      position: absolute;
      z-index: 32;
      left: 0;
      right: 0;
      bottom: 0;
      min-height: 250px;
      padding: 22px 22px 22px;
      background: linear-gradient(180deg, rgba(255, 244, 203, 0), rgba(255, 244, 203, 0.96) 18%, var(--cream) 100%);
    }

    .start-button {
      position: relative;
      width: 100%;
      height: 82px;
      display: grid;
      grid-template-columns: 1fr auto;
      align-items: center;
      padding: 0 20px 0 24px;
      border: 4px solid rgba(255, 255, 255, 0.94);
      border-radius: 26px;
      color: #fff;
      text-align: left;
      background:
        linear-gradient(180deg, rgba(255,255,255,0.24), transparent 32%),
        linear-gradient(180deg, #ffb43b 0%, var(--orange) 56%, var(--orange-dark) 100%);
      box-shadow: 0 8px 0 rgba(111, 50, 2, 0.28), 0 18px 34px rgba(255, 116, 22, 0.28);
      transition: transform 150ms ease, filter 150ms ease;
      animation: startPulse 1.45s ease-in-out infinite;
    }

    .start-text strong,
    .start-text span {
      display: block;
    }

    .start-text strong {
      font-size: 30px;
      line-height: 1;
      font-weight: 900;
      text-shadow: 0 3px 0 rgba(116, 45, 0, 0.27);
    }

    .start-text span {
      margin-top: 6px;
      font-size: 12px;
      font-weight: 900;
      opacity: 0.88;
    }

    .start-arrow {
      width: 48px;
      height: 48px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      background: rgba(255, 255, 255, 0.22);
    }

    .start-arrow svg {
      width: 30px;
      height: 30px;
      fill: none;
      stroke: #fff;
      stroke-width: 4;
      stroke-linecap: round;
      stroke-linejoin: round;
    }

    .dock {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 9px;
      margin-top: 18px;
    }

    .dock-button {
      height: 72px;
      display: grid;
      place-items: center;
      align-content: center;
      gap: 5px;
      border-radius: 19px;
      color: #683708;
      background: linear-gradient(180deg, #fffdf2, #ffe4a2);
      font-size: 13px;
      font-weight: 900;
      transition: transform 150ms ease, filter 150ms ease;
    }

    .dock-icon {
      width: 31px;
      height: 31px;
      display: grid;
      place-items: center;
      border-radius: 50%;
      color: #fff;
      background: var(--orange);
      box-shadow: inset 0 -3px 0 rgba(90, 36, 0, 0.2);
    }

    .dock-icon svg {
      width: 19px;
      height: 19px;
      stroke-width: 2.7;
    }

    .dock-button:nth-child(2) .dock-icon {
      background: var(--blue);
    }

    .dock-button:nth-child(3) .dock-icon {
      background: var(--green);
    }

    .dock-button:nth-child(4) .dock-icon {
      background: #66737d;
    }

    .toast {
      position: absolute;
      z-index: 50;
      left: 50%;
      bottom: 220px;
      min-width: 158px;
      padding: 10px 14px;
      border: 2px solid rgba(255,255,255,0.88);
      border-radius: 999px;
      color: #fff;
      background: rgba(23, 34, 44, 0.88);
      box-shadow: 0 10px 24px rgba(10, 25, 34, 0.22);
      font-size: 13px;
      font-weight: 900;
      text-align: center;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      transition: opacity 180ms ease, transform 180ms ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    .screen.is-starting .route-panel::after {
      animation-duration: 420ms;
    }

    .screen.is-starting .courier {
      animation-duration: 760ms;
    }

    .screen.is-starting .start-button {
      filter: saturate(1.12) brightness(1.03);
    }

    .mode-button:active,
    .mini-action:active,
    .dock-button:active,
    .start-button:active {
      transform: translateY(3px) scale(0.98);
      filter: brightness(0.96);
    }

    @media (hover: hover) {
      .mode-button:hover,
      .mini-action:hover,
      .dock-button:hover,
      .start-button:hover {
        transform: translateY(-2px);
        filter: brightness(1.04) saturate(1.04);
      }

      .mode-button.active:hover {
        color: #fff;
      }
    }

    @keyframes cloudDrift {
      from {
        transform: translateX(0);
      }
      to {
        transform: translateX(18px);
      }
    }

    @keyframes laneRun {
      to {
        background-position-y: 48px;
      }
    }

    @keyframes courierFloat {
      0%, 100% {
        transform: translateX(-50%) translateY(0) rotate(1deg);
      }
      50% {
        transform: translateX(-50%) translateY(-8px) rotate(-1deg);
      }
    }

    @keyframes shadowBeat {
      0%, 100% {
        transform: scale(1);
        opacity: 0.25;
      }
      50% {
        transform: scale(0.84);
        opacity: 0.14;
      }
    }

    @keyframes coinPop {
      0%, 100% {
        transform: scale(1) rotate(0);
      }
      50% {
        transform: scale(1.12) rotate(9deg);
      }
    }

    @keyframes startPulse {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-2px) scale(1.018);
      }
    }

    @media (max-width: 430px) {
      body {
        padding: 0;
        background: #101820;
      }

      .phone {
        width: 100vw;
        min-height: 100vh;
        aspect-ratio: auto;
        border: 0;
        border-radius: 0;
        box-shadow: none;
      }

      .screen {
        border-radius: 0;
      }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="外卖冲冲冲首页">
    <section class="screen" id="screen">
      <div class="skyline" aria-hidden="true">
        <div class="sun"></div>
        <div class="cloud one"></div>
        <div class="cloud two"></div>
        <div class="buildings"></div>
      </div>

      <header class="top-bar">
        <div class="profile">
          <strong>Lv.1 闪送骑手</strong>
          <span>最高 0 单 / 连击 0</span>
          <div class="xp-track"><i></i></div>
        </div>
        <div class="wallet" aria-label="金币 0">
          <span class="coin" aria-hidden="true"></span>
          <span>0</span>
        </div>
      </header>

      <section class="brand" aria-label="游戏标题">
        <h1>外卖<br><span>冲冲冲</span></h1>
        <p id="modeSubtitle">穿街过巷，准时送达</p>
      </section>

      <nav class="mode-row" aria-label="模式选择">
        <button class="mode-button active" data-mode="极速单" data-reward="+¥30" data-subtitle="穿街过巷，准时送达">极速单</button>
        <button class="mode-button" data-mode="连击赛" data-reward="x3" data-subtitle="连续送达，奖励翻倍">连击赛</button>
        <button class="mode-button" data-mode="练习场" data-reward="0罚时" data-subtitle="熟悉路口，轻松热身">练习场</button>
      </nav>

      <section class="route-panel" aria-label="今日路线">
        <svg class="route-path" viewBox="0 0 342 298" aria-hidden="true">
          <path d="M40 228 C78 170 91 124 136 118 C176 112 181 160 218 151 C254 143 266 92 306 62" fill="none" stroke="#fff" stroke-width="12" stroke-linecap="round" opacity=".58"></path>
          <path d="M40 228 C78 170 91 124 136 118 C176 112 181 160 218 151 C254 143 266 92 306 62" fill="none" stroke="#11c5b4" stroke-width="5" stroke-linecap="round" stroke-dasharray="13 11"></path>
          <path d="M32 78h90M220 226h88M48 42h56M236 34h52" stroke="rgba(255,255,255,.34)" stroke-width="10" stroke-linecap="round"></path>
          <path d="M55 88h76M230 236h72M58 52h44M244 44h42" stroke="rgba(26,40,51,.16)" stroke-width="4" stroke-linecap="round"></path>
        </svg>
        <div class="map-pin pin-a"><span>店</span></div>
        <div class="map-pin pin-b"><span>家</span></div>
        <div class="map-pin pin-c"><span>奖</span></div>
        <div class="route-glow"></div>
        <svg class="courier" viewBox="0 0 154 154" aria-hidden="true">
          <rect x="15" y="13" width="124" height="124" rx="30" fill="#eefaff"></rect>
          <ellipse cx="77" cy="122" rx="42" ry="12" fill="#142330" opacity=".2"></ellipse>
          <path d="M38 92 22 107l27 22 19-21Z" fill="#2f8cff"></path>
          <rect x="60" y="66" width="38" height="58" rx="13" fill="#ff8316"></rect>
          <path d="M104 64h28a11 11 0 0 1 11 11v32a11 11 0 0 1-11 11h-28Z" fill="#ffd95a"></path>
          <path d="M46 59c4-25 21-38 43-35 23 4 35 20 33 43Z" fill="#ff8316"></path>
          <path d="M58 65h52v18a26 26 0 0 1-52 0Z" fill="#ffce99"></path>
          <path d="M48 67h67v12H48Z" fill="#263c4a"></path>
          <circle cx="68" cy="81" r="3.6" fill="#142330"></circle>
          <circle cx="99" cy="81" r="3.6" fill="#142330"></circle>
          <path d="M72 98c8 6 17 6 25 0" fill="none" stroke="#142330" stroke-width="3.8" stroke-linecap="round"></path>
          <path d="M42 121h76" fill="none" stroke="#263c4a" stroke-width="8" stroke-linecap="round"></path>
          <circle cx="56" cy="122" r="7" fill="#142330"></circle>
          <circle cx="111" cy="122" r="7" fill="#142330"></circle>
        </svg>
        <aside class="order-card" aria-label="今日悬赏">
          <strong id="rewardText">+¥30</strong>
          <span id="rewardDesc">准时送达<br>2 单</span>
        </aside>
      </section>

      <nav class="action-rail" aria-label="快捷入口">
        <button class="mini-action" aria-label="任务">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 5h9"></path><path d="M8 12h9"></path><path d="M8 19h9"></path>
            <path d="M4 5.5l1 1 2-2"></path><path d="M4 12.5l1 1 2-2"></path><path d="M4 19.5l1 1 2-2"></path>
          </svg>
        </button>
        <button class="mini-action" aria-label="成就">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M8 4h8v4a4 4 0 0 1-8 0V4Z"></path><path d="M6 6H3c0 3 2 5 5 5"></path><path d="M18 6h3c0 3-2 5-5 5"></path>
            <path d="M12 12v5"></path><path d="M8 20h8"></path>
          </svg>
        </button>
        <button class="mini-action" aria-label="设置">
          <svg viewBox="0 0 24 24" aria-hidden="true">
            <path d="M12 15.5a3.5 3.5 0 1 0 0-7 3.5 3.5 0 0 0 0 7Z"></path>
            <path d="M19 12a7.5 7.5 0 0 0-.1-1l2-1.5-2-3.4-2.4 1a7 7 0 0 0-1.7-1L14.5 3h-5l-.4 3.1a7 7 0 0 0-1.7 1l-2.4-1-2 3.4 2 1.5a7.5 7.5 0 0 0 0 2l-2 1.5 2 3.4 2.4-1a7 7 0 0 0 1.7 1l.4 3.1h5l.4-3.1a7 7 0 0 0 1.7-1l2.4 1 2-3.4-2-1.5c.1-.3.1-.7.1-1Z"></path>
          </svg>
        </button>
      </nav>

      <section class="bottom-sheet" aria-label="主要操作">
        <button class="start-button" id="startButton">
          <span class="start-text">
            <strong id="startText">立即开跑</strong>
            <span id="startSubtext">极速单 · 预计 90 秒</span>
          </span>
          <span class="start-arrow" aria-hidden="true">
            <svg viewBox="0 0 24 24"><path d="M5 12h13"></path><path d="m13 6 6 6-6 6"></path></svg>
          </span>
        </button>
        <nav class="dock" aria-label="成长入口">
          <button class="dock-button" aria-label="骑手">
            <span class="dock-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 3a5 5 0 0 1 5 5v1a5 5 0 0 1-10 0V8a5 5 0 0 1 5-5Z"></path><path d="M4 21a8 8 0 0 1 16 0"></path></svg></span>
            骑手
          </button>
          <button class="dock-button" aria-label="升级">
            <span class="dock-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="m12 3 7 7h-4v7H9v-7H5l7-7Z"></path><path d="M6 21h12"></path></svg></span>
            升级
          </button>
          <button class="dock-button" aria-label="订单">
            <span class="dock-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 4h10v16H7Z"></path><path d="M9.5 8h5"></path><path d="M9.5 12h5"></path><path d="M9.5 16h3"></path></svg></span>
            订单
          </button>
          <button class="dock-button" aria-label="背包">
            <span class="dock-icon"><svg viewBox="0 0 24 24" aria-hidden="true"><path d="M7 8V6a5 5 0 0 1 10 0v2"></path><path d="M5 8h14l-1 13H6Z"></path><path d="M9 12h6"></path></svg></span>
            背包
          </button>
        </nav>
      </section>

      <div class="toast" id="toast" role="status" aria-live="polite">路线已锁定</div>
    </section>
  </main>

  <script>
    const screen = document.querySelector("#screen");
    const toast = document.querySelector("#toast");
    const startButton = document.querySelector("#startButton");
    const startText = document.querySelector("#startText");
    const startSubtext = document.querySelector("#startSubtext");
    const rewardText = document.querySelector("#rewardText");
    const rewardDesc = document.querySelector("#rewardDesc");
    const modeSubtitle = document.querySelector("#modeSubtitle");
    const modeButtons = document.querySelectorAll(".mode-button");
    const menuButtons = document.querySelectorAll(".mini-action, .dock-button");
    let activeMode = "极速单";
    let toastTimer = 0;

    function showToast(text) {
      window.clearTimeout(toastTimer);
      toast.textContent = text;
      toast.classList.add("show");
      toastTimer = window.setTimeout(() => toast.classList.remove("show"), 1400);
    }

    modeButtons.forEach((button) => {
      button.addEventListener("click", () => {
        modeButtons.forEach((item) => item.classList.remove("active"));
        button.classList.add("active");
        activeMode = button.dataset.mode;
        rewardText.textContent = button.dataset.reward;
        modeSubtitle.textContent = button.dataset.subtitle;
        rewardDesc.innerHTML = activeMode === "连击赛"
          ? "连续送达<br>3 单"
          : activeMode === "练习场"
            ? "自由练习<br>不限时"
            : "准时送达<br>2 单";
        startSubtext.textContent = activeMode + (activeMode === "练习场" ? " · 无罚时" : " · 预计 90 秒");
        showToast(activeMode + " 已选择");
      });
    });

    startButton.addEventListener("click", () => {
      screen.classList.add("is-starting");
      startText.textContent = "路线锁定";
      showToast(activeMode + " 出发");
      window.setTimeout(() => {
        screen.classList.remove("is-starting");
        startText.textContent = "立即开跑";
      }, 1300);
    });

    menuButtons.forEach((button) => {
      button.addEventListener("click", () => {
        showToast(button.getAttribute("aria-label"));
      });
    });
  </script>
</body>
</html>
