<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>外卖冲冲冲 - 游戏内 UI 原型</title>
  <style>
    :root {
      --blue: #28b8f0;
      --blue-dark: #1479c9;
      --orange: #ff8618;
      --orange-dark: #d9570f;
      --yellow: #ffd447;
      --green: #23c979;
      --ink: #182b38;
      --cream: #fff5ce;
      --shadow: 0 8px 0 rgba(104, 61, 6, 0.22), 0 18px 28px rgba(11, 38, 52, 0.22);
      font-family: "Microsoft YaHei", "PingFang SC", system-ui, sans-serif;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background:
        radial-gradient(circle at 20% 18%, rgba(255, 212, 71, 0.22), transparent 24%),
        linear-gradient(180deg, #dff7ff, #eef8fb 58%, #e7f2ea);
      color: var(--ink);
    }

    .phone {
      width: min(390px, 100vw);
      height: min(844px, 100vh);
      position: relative;
      overflow: hidden;
      background: #8bddff;
      box-shadow: 0 28px 70px rgba(11, 34, 48, 0.28);
    }

    .world {
      position: absolute;
      inset: 0;
      overflow: hidden;
      background:
        radial-gradient(circle at 72% 13%, #fff8a8 0 4%, #ffd447 4.2% 9%, transparent 9.2%),
        linear-gradient(180deg, #84dcff 0%, #c9f0ff 27%, #e9f4f3 42%, #b8ddaa 100%);
    }

    .cloud {
      position: absolute;
      height: 28px;
      border-radius: 999px;
      background: rgba(255, 255, 255, 0.76);
      filter: blur(0.1px);
      animation: drift 7s ease-in-out infinite;
    }

    .cloud::before,
    .cloud::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      background: inherit;
    }

    .cloud::before {
      width: 42px;
      height: 42px;
      left: 18px;
      top: -18px;
    }

    .cloud::after {
      width: 54px;
      height: 54px;
      right: 22px;
      top: -27px;
    }

    .cloud.one {
      width: 106px;
      left: 34px;
      top: 94px;
    }

    .cloud.two {
      width: 138px;
      right: 22px;
      top: 156px;
      opacity: 0.82;
      animation-delay: -2.4s;
    }

    .city {
      position: absolute;
      left: -16px;
      right: -16px;
      top: 242px;
      height: 150px;
      opacity: 0.62;
      background:
        linear-gradient(90deg,
          transparent 0 5%,
          #6bb6d0 5% 9%,
          transparent 9% 13%,
          #95bdc5 13% 22%,
          transparent 22% 28%,
          #8ec2c8 28% 34%,
          transparent 34% 62%,
          #92c0ba 62% 66%,
          transparent 66% 71%,
          #77b4ce 71% 80%,
          transparent 80% 100%);
    }

    .grass {
      position: absolute;
      left: 0;
      right: 0;
      bottom: 0;
      height: 458px;
      background: linear-gradient(180deg, #98c995, #79ad7e);
    }

    .road {
      position: absolute;
      left: 50%;
      top: 270px;
      width: 620px;
      height: 720px;
      transform: translateX(-50%);
      clip-path: polygon(42% 0, 58% 0, 100% 100%, 0 100%);
      background:
        linear-gradient(90deg, transparent 0 18%, rgba(255,255,255,0.48) 18% 19%, transparent 19% 81%, rgba(255,255,255,0.48) 81% 82%, transparent 82%),
        linear-gradient(180deg, #566673 0%, #31414f 58%, #25313c 100%);
      box-shadow: inset 0 0 0 2px rgba(255, 255, 255, 0.08);
    }

    .road::before {
      content: "";
      position: absolute;
      left: 49.4%;
      top: 0;
      width: 8px;
      height: 100%;
      transform: translateX(-50%);
      background: repeating-linear-gradient(180deg, rgba(235, 250, 255, 0.92) 0 28px, transparent 28px 58px);
      animation: laneMove 0.9s linear infinite;
    }

    .road::after {
      content: "";
      position: absolute;
      left: 0;
      right: 0;
      top: 0;
      height: 220px;
      background: linear-gradient(180deg, rgba(132, 220, 255, 0.55), transparent);
    }

    .sidewalk {
      position: absolute;
      top: 346px;
      width: 138px;
      height: 610px;
      background: linear-gradient(180deg, #eaf2e8, #cfdbd5);
      opacity: 0.9;
    }

    .sidewalk.left {
      left: -16px;
      transform: skewX(-24deg);
    }

    .sidewalk.right {
      right: -16px;
      transform: skewX(24deg);
    }

    .building {
      position: absolute;
      bottom: 438px;
      width: 36px;
      border-radius: 3px 3px 0 0;
      opacity: 0.76;
    }

    .building.a { left: 48px; height: 92px; background: #bda989; }
    .building.b { left: 86px; height: 118px; background: #ab95a0; }
    .building.c { right: 40px; height: 106px; background: #a9bd9f; }
    .building.d { right: 80px; height: 82px; background: #b493a7; }

    .pickup {
      position: absolute;
      left: 50%;
      top: 526px;
      width: 66px;
      height: 12px;
      transform: translateX(-50%) perspective(80px) rotateX(36deg);
      border-radius: 4px;
      background: linear-gradient(180deg, #ffe16e, #c9aa44);
      box-shadow: 0 6px 16px rgba(44, 32, 8, 0.2);
      animation: pickupPulse 1.2s ease-in-out infinite;
    }

    .rider {
      position: absolute;
      left: 50%;
      bottom: 154px;
      width: 74px;
      height: 112px;
      transform: translateX(-50%);
      animation: riderBob 0.9s ease-in-out infinite;
    }

    .rider .shadow {
      position: absolute;
      left: 5px;
      right: 5px;
      bottom: -10px;
      height: 18px;
      border-radius: 50%;
      background: rgba(18, 35, 42, 0.22);
    }

    .rider .body {
      position: absolute;
      left: 18px;
      bottom: 6px;
      width: 38px;
      height: 72px;
      border-radius: 16px 16px 12px 12px;
      background: linear-gradient(180deg, #66b6d5, #347b9f);
      box-shadow: inset 5px 0 rgba(255, 255, 255, 0.14);
    }

    .rider .head {
      position: absolute;
      left: 18px;
      top: 10px;
      width: 38px;
      height: 34px;
      border-radius: 50%;
      background: #f2d7bb;
      box-shadow: inset 0 -5px rgba(90, 54, 27, 0.13);
    }

    .rider .helmet {
      position: absolute;
      left: 14px;
      top: 0;
      width: 46px;
      height: 22px;
      border-radius: 50% 50% 42% 42%;
      background: linear-gradient(180deg, #ffe15a, #cbb828);
    }

    .hud {
      position: absolute;
      inset: 0;
      pointer-events: none;
      z-index: 10;
    }

    .pill {
      border: 3px solid rgba(255, 255, 255, 0.78);
      box-shadow: var(--shadow);
      backdrop-filter: blur(4px);
    }

    .wallet {
      position: absolute;
      left: 12px;
      top: 14px;
      width: 136px;
      height: 64px;
      border-radius: 18px;
      background: linear-gradient(180deg, rgba(37, 54, 69, 0.9), rgba(20, 32, 43, 0.9));
      padding: 7px 12px;
      color: #fff;
    }

    .coin-row {
      display: flex;
      align-items: center;
      gap: 7px;
      height: 27px;
      color: var(--yellow);
      font-size: 24px;
      font-weight: 900;
      line-height: 1;
    }

    .coin-icon {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background:
        radial-gradient(circle at 36% 30%, #fff8a5 0 20%, transparent 22%),
        linear-gradient(145deg, #ffe66c, #ff9f1a);
      box-shadow: inset 0 -2px 0 rgba(120, 68, 0, 0.24);
    }

    .wallet small {
      display: block;
      margin-top: 5px;
      color: #b7e7ff;
      font-size: 11px;
      font-weight: 800;
      white-space: nowrap;
    }

    .order-state {
      position: absolute;
      left: 154px;
      top: 18px;
      width: 112px;
      height: 46px;
      border-radius: 20px;
      display: grid;
      place-items: center;
      color: #7a3900;
      background: rgba(255, 247, 223, 0.94);
      font-size: 18px;
      font-weight: 900;
    }

    .speed {
      position: absolute;
      right: 64px;
      top: 18px;
      width: 58px;
      height: 34px;
      border-radius: 16px;
      display: grid;
      place-items: center;
      color: #fff;
      background: rgba(16, 38, 52, 0.74);
      font-size: 14px;
      font-weight: 900;
    }

    .pause {
      position: absolute;
      right: 12px;
      top: 18px;
      width: 48px;
      height: 34px;
      border-radius: 17px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(180deg, #45c8ff, #2382df);
      font-size: 13px;
      font-weight: 900;
      box-shadow: 0 5px 0 rgba(16, 61, 112, 0.34), 0 12px 18px rgba(9, 31, 50, 0.18);
    }

    .radar {
      position: absolute;
      right: 12px;
      top: 92px;
      width: 132px;
      height: 148px;
      border-radius: 16px;
      background: rgba(15, 28, 42, 0.82);
      border: 2px solid rgba(255, 255, 255, 0.18);
      box-shadow: 0 12px 24px rgba(8, 27, 38, 0.18);
      overflow: hidden;
    }

    .radar-title {
      position: absolute;
      left: 10px;
      top: 7px;
      color: #fff;
      font-size: 12px;
      font-weight: 900;
    }

    .radar-n {
      position: absolute;
      right: 11px;
      top: 7px;
      color: #5cddff;
      font-size: 11px;
      font-weight: 900;
    }

    .map-grid {
      position: absolute;
      left: 10px;
      top: 28px;
      width: 104px;
      height: 104px;
      background:
        linear-gradient(rgba(255,255,255,0.28) 2px, transparent 2px) 0 0 / 26px 26px,
        linear-gradient(90deg, rgba(255,255,255,0.28) 2px, transparent 2px) 0 0 / 26px 26px;
      opacity: 0.72;
    }

    .route {
      position: absolute;
      border-radius: 999px;
      background: #2ee6c0;
      box-shadow: 0 0 12px rgba(46, 230, 192, 0.55);
    }

    .route.a { left: 38px; top: 55px; width: 42px; height: 5px; }
    .route.b { left: 75px; top: 55px; width: 5px; height: 42px; }

    .dot {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #2dd4bf;
    }

    .dot.one { left: 74px; top: 72px; }
    .dot.two { left: 100px; top: 98px; }

    .player-arrow {
      position: absolute;
      left: 60px;
      top: 91px;
      width: 0;
      height: 0;
      border-left: 10px solid transparent;
      border-right: 10px solid transparent;
      border-bottom: 22px solid #ff4545;
      filter: drop-shadow(0 3px 2px rgba(0,0,0,0.22));
    }

    .mini-status {
      position: absolute;
      left: 10px;
      right: 10px;
      bottom: 4px;
      text-align: center;
      color: #ffe876;
      font-size: 12px;
      font-weight: 900;
    }

    .orders {
      position: absolute;
      right: 12px;
      top: 248px;
      width: 132px;
      padding: 8px;
      border-radius: 14px;
      background: rgba(255, 248, 224, 0.95);
      box-shadow: 0 8px 0 rgba(104, 61, 6, 0.16), 0 16px 24px rgba(9, 31, 50, 0.14);
    }

    .orders b {
      display: block;
      height: 16px;
      color: var(--orange);
      font-size: 11px;
      text-align: center;
      line-height: 1;
    }

    .order-row {
      height: 18px;
      display: flex;
      align-items: center;
      gap: 6px;
      color: #243640;
      font-size: 12px;
      font-weight: 900;
    }

    .order-row i {
      width: 9px;
      height: 9px;
      border-radius: 50%;
      background: #2dd4bf;
    }

    .order-row:nth-child(3) i {
      background: #ffd447;
    }

    .order-row:nth-child(4) i {
      background: #ff6c7a;
    }

    .skill {
      position: absolute;
      left: 14px;
      bottom: 54px;
      width: 142px;
      height: 66px;
      padding: 7px;
      border-radius: 20px;
      background: rgba(255, 248, 224, 0.94);
      box-shadow: var(--shadow);
    }

    .skill button {
      width: 128px;
      height: 34px;
      border: 0;
      border-radius: 17px;
      color: #fff;
      background: linear-gradient(180deg, #45c8ff, #2382df);
      font: inherit;
      font-size: 16px;
      font-weight: 900;
      box-shadow: inset 0 -3px 0 rgba(16, 61, 112, 0.28);
    }

    .skill span {
      display: block;
      margin-top: 3px;
      color: #5b3608;
      font-size: 11px;
      font-weight: 900;
      text-align: center;
    }

    .turn-hint {
      position: absolute;
      left: 50%;
      bottom: 42px;
      width: 184px;
      height: 40px;
      transform: translateX(-50%);
      display: flex;
      justify-content: center;
      align-items: center;
      gap: 8px;
      border-radius: 22px;
      color: #fff;
      background: rgba(16, 38, 52, 0.72);
      border: 2px solid rgba(255, 255, 255, 0.2);
      font-size: 14px;
      font-weight: 900;
      box-shadow: 0 12px 22px rgba(8, 27, 38, 0.18);
    }

    .arrow-key {
      width: 28px;
      height: 28px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #7a3900;
      background: var(--yellow);
      box-shadow: inset 0 -3px rgba(122, 57, 0, 0.2);
    }

    .combo {
      position: absolute;
      right: 66px;
      top: 56px;
      width: 72px;
      text-align: center;
      color: #00e5b8;
      font-size: 16px;
      font-weight: 900;
      text-shadow: 0 3px 0 rgba(0, 0, 0, 0.18);
      animation: comboPop 1.1s ease-in-out infinite;
    }

    @keyframes laneMove {
      from { background-position-y: 0; }
      to { background-position-y: 58px; }
    }

    @keyframes drift {
      0%, 100% { transform: translateX(0); }
      50% { transform: translateX(10px); }
    }

    @keyframes riderBob {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(-4px); }
    }

    @keyframes pickupPulse {
      0%, 100% { opacity: 0.82; box-shadow: 0 6px 16px rgba(44, 32, 8, 0.2); }
      50% { opacity: 1; box-shadow: 0 6px 20px rgba(255, 212, 71, 0.45); }
    }

    @keyframes comboPop {
      0%, 100% { transform: scale(1); }
      50% { transform: scale(1.08); }
    }
  </style>
</head>
<body>
  <main class="phone" aria-label="游戏内 UI 原型">
    <section class="world" aria-hidden="true">
      <div class="cloud one"></div>
      <div class="cloud two"></div>
      <div class="city"></div>
      <div class="grass"></div>
      <div class="sidewalk left"></div>
      <div class="sidewalk right"></div>
      <div class="building a"></div>
      <div class="building b"></div>
      <div class="building c"></div>
      <div class="building d"></div>
      <div class="road"></div>
      <div class="pickup"></div>
      <div class="rider">
        <div class="shadow"></div>
        <div class="body"></div>
        <div class="head"></div>
        <div class="helmet"></div>
      </div>
    </section>

    <section class="hud">
      <div class="wallet pill">
        <div class="coin-row"><span class="coin-icon"></span><span>¥0</span></div>
        <small>Lv.1 新手骑手 · XP 0/60</small>
      </div>

      <div class="order-state pill">等待订单</div>
      <div class="speed">8m/s</div>
      <div class="pause">暂停</div>
      <div class="combo">x3 连击</div>

      <aside class="radar">
        <span class="radar-title">路线雷达</span>
        <span class="radar-n">N</span>
        <div class="map-grid"></div>
        <div class="route a"></div>
        <div class="route b"></div>
        <div class="dot one"></div>
        <div class="dot two"></div>
        <div class="player-arrow"></div>
        <div class="mini-status">当前订单</div>
      </aside>

      <aside class="orders">
        <b>可接订单</b>
        <div class="order-row"><i></i><span>普 / 12¥</span></div>
        <div class="order-row"><i></i><span>急 / 18¥</span></div>
        <div class="order-row"><i></i><span>远 / 24¥</span></div>
      </aside>

      <div class="skill">
        <button>冲刺</button>
        <span>护盾已就绪</span>
      </div>

      <div class="turn-hint">
        <span class="arrow-key">←</span>
        <span>路口选择</span>
        <span class="arrow-key">→</span>
      </div>
    </section>
  </main>
</body>
</html>
